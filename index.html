<script>
  const quotes = [
    "Front-End Design For A Professional Presence",
    "Basic Build Out Using HTML, CSS, and JavaScript",
    "Responsive Builds For Multiple Devices"
  ];

  let index = 0;
  const quoteElement = document.getElementById("quote");

  function showQuote() {
    quoteElement.innerText = quotes[index];
    index = (index + 1) % quotes.length; // loop back to start
  }

  // Show first quote immediately
  showQuote();

  // Change quote every 5 seconds
  setInterval(showQuote, 5000);
</script>
